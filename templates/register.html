<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register — Jayam</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-Pi7vE+s6jT0xDkKLXjP7x4orV5rKx6Ex8SAGfi5LoAO1xxR1rcbjbUW+q3W5XzghVcDga5R6n3S0zJ9YhOaNSw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#1c1410;--cream:#faf7f2;--gold:#c9a96e;--rose:#d4756a;--ease:cubic-bezier(0.22,1,0.36,1)}
body{font-family:'DM Sans',sans-serif;background:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
.bg{position:fixed;inset:0}.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.25}
.orb1{width:500px;height:500px;background:radial-gradient(circle,#c9a96e,transparent 70%);top:-100px;right:-100px;animation:float 8s ease-in-out infinite}
.orb2{width:350px;height:350px;background:radial-gradient(circle,#7a9e8c,transparent 70%);bottom:-80px;left:-80px;animation:float 6s ease-in-out -2s infinite}
@keyframes float{0%,100%{transform:translate(0,0)}50%{transform:translate(15px,-12px)}}
.card{background:rgba(250,247,242,.04);backdrop-filter:blur(20px);border:1px solid rgba(201,169,110,.2);border-radius:24px;padding:3rem;width:100%;max-width:420px;position:relative;z-index:1;animation:cardIn .7s var(--ease) both}
@keyframes cardIn{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:none}}
.logo{text-align:center;margin-bottom:1.5rem}
.logo-l{font-family:'Cormorant Garamond',serif;font-size:2.2rem;color:var(--gold)}
.logo-rest{font-family:'Cormorant Garamond',serif;font-size:1.9rem;font-weight:300;color:var(--cream)}
h2{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:300;color:var(--cream);text-align:center;margin-bottom:.4rem}
.sub{text-align:center;font-size:.85rem;color:rgba(250,247,242,.4);margin-bottom:1.8rem}
.form-group{margin-bottom:1.1rem}
label{display:block;font-size:.72rem;letter-spacing:.15em;text-transform:uppercase;color:rgba(201,169,110,.7);margin-bottom:6px}
input{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(201,169,110,.2);border-radius:10px;padding:12px 16px;font-size:.95rem;color:var(--cream);font-family:'DM Sans',sans-serif;outline:none;transition:border-color .25s,box-shadow .25s}
input::placeholder{color:rgba(250,247,242,.25)}
input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,169,110,.15)}
.btn{width:100%;background:var(--gold);color:var(--ink);border:none;border-radius:10px;padding:14px;font-size:1rem;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .2s,transform .15s;margin-top:.5rem}
.btn:hover{background:#d4b578;transform:translateY(-1px)}
.error-msg{background:rgba(212,117,106,.15);border:1px solid rgba(212,117,106,.3);border-radius:8px;color:#f0a09a;font-size:.84rem;padding:10px 14px;margin-bottom:1rem;display:none}
.link-row{text-align:center;font-size:.85rem;color:rgba(250,247,242,.4);margin-top:1.2rem}
.link-row a{color:var(--gold);text-decoration:none}
.link-row a:hover{color:#d4b578}
</style>
</head>
<body>
<div class="bg"><div class="orb orb1"></div><div class="orb orb2"></div></div>
<div class="card">
  <div class="logo"><span class="logo-l">J</span><span class="logo-rest">ayam</span></div>
  <h2>Create account</h2>
  <p class="sub">Join the Jayam community</p>
  <div class="error-msg" id="err"></div>
  <div class="form-group"><label>Full Name</label><input type="text" id="name" placeholder="Ada Lovelace" /></div>
  <div class="form-group"><label>Email</label><input type="email" id="email" placeholder="you@example.com" /></div>
  <div class="form-group"><label>Password</label><input type="password" id="password" placeholder="At least 6 characters" /></div>
  <button class="btn" onclick="doRegister()">Create Account</button>
  <div class="link-row">Already have an account? <a href="/login">Sign in</a></div>
  <div class="link-row" style="margin-top:.5rem"><a href="/">← Back to shop</a></div>
</div>
<script>
async function doRegister() {
  const name=document.getElementById('name').value.trim();
  const email=document.getElementById('email').value.trim();
  const password=document.getElementById('password').value;
  if (!name||!email||!password){showErr('Please fill in all fields');return}
  if (password.length<6){showErr('Password must be at least 6 characters');return}
  const res=await fetch('/api/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,email,password})});
  const data=await res.json();
  if(data.success) window.location.href=data.redirect;
  else showErr(data.error||'Registration failed');
}
function showErr(msg){const e=document.getElementById('err');e.textContent=msg;e.style.display='block'}
document.addEventListener('keydown',e=>{if(e.key==='Enter')doRegister()});
</script>
</body>
</html>
